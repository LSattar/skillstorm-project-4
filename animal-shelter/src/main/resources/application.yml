app:
  frontend-url: ${FRONTEND_URL:http://localhost:4200}
  jwt:
    # In production set JWT_SECRET (e.g. openssl rand -base64 32). Default allows local dev only.
    secret: ${JWT_SECRET:change-me-in-production-use-openssl-rand-base64-32}
    issuer: ${JWT_ISSUER:animal-shelter-api}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}
  aws:
    s3:
      bucket-name: ljs-animal-shelter-photos
      region: ${AWS_REGION:us-east-1}
      presign-expiration-minutes: 60

spring:
  application:
    name: animal-shelter
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:294250356006-caqgcji4sjk9cf7nfnr2e5c53cf8ce55.apps.googleusercontent.com}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: openid, profile, email
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:animal-shelter}?useSSL=false&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  sql:
    init:
      mode: never
