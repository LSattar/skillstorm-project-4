<header class="header">
  <a routerLink="/" class="site-title">Animal Shelter</a>
  <nav class="nav">
    @if (currentUser$ | async; as user) {
      <span class="user-name">{{ user.displayName || user.username }}</span>
      @if (isStaff(user)) {
        <a routerLink="/staff" routerLinkActive="active">Dashboard</a>
        <a routerLink="/staff/animals" routerLinkActive="active">Animals</a>
        <a routerLink="/staff/applications" routerLinkActive="active">Applications</a>
        <a routerLink="/staff/employees" routerLinkActive="active">Employees</a>
      }
      @if (isAdopter(user)) {
        <a routerLink="/adopter/profile" routerLinkActive="active">Profile</a>
        <a routerLink="/adopter/questionnaire" routerLinkActive="active">Questionnaire</a>
        <a routerLink="/adopter/applications" routerLinkActive="active">My Applications</a>
      }
      <button type="button" class="logout-btn" (click)="logout()">Logout</button>
    } @else {
      <a routerLink="/login" class="login-btn">Login</a>
      <a routerLink="/register" class="login-btn">Register</a>
    }
  </nav>
</header>
<main class="main">
  <router-outlet />
</main>
<app-footer />
