<h2>Add Employee</h2>

@if (error) {
  <p class="error">{{ error }}</p>
}

<form [formGroup]="form" (ngSubmit)="onSubmit()">
  <div class="form-row">
    <label for="username">Username *</label>
    <input id="username" formControlName="username" type="text" />
  </div>
  <div class="form-row">
    <label for="email">Email *</label>
    <input id="email" formControlName="email" type="email" />
  </div>
  <div class="form-row">
    <label for="password">Password * (min 8 characters)</label>
    <input id="password" formControlName="password" type="password" />
  </div>
  <div class="form-row">
    <label for="displayName">Display name</label>
    <input id="displayName" formControlName="displayName" type="text" />
  </div>
  <div class="form-row">
    <label for="phone">Phone</label>
    <input id="phone" formControlName="phone" type="text" />
  </div>
  <div class="form-actions">
    <button type="submit" [disabled]="saving">{{ saving ? 'Saving…' : 'Create employee' }}</button>
    <a routerLink="/staff/employees">Cancel</a>
  </div>
</form>
