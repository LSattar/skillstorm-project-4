<div class="login-page">
  <h1>Register</h1>

  @if (error) {
    <p class="error">{{ error }}</p>
  }

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="form-row">
      <label for="username">Username</label>
      <input id="username" formControlName="username" type="text" autocomplete="username" />
    </div>
    <div class="form-row">
      <label for="email">Email</label>
      <input id="email" formControlName="email" type="email" autocomplete="email" />
    </div>
    <div class="form-row">
      <label for="displayName">Display Name</label>
      <input id="displayName" formControlName="displayName" type="text" autocomplete="name" />
    </div>
    <div class="form-row">
      <label for="password">Password</label>
      <input id="password" formControlName="password" type="password" autocomplete="new-password" />
    </div>
    <button type="submit" [disabled]="loading || form.invalid">{{ loading ? 'Creating account…' : 'Create account' }}</button>
  </form>

  <p><a routerLink="/login">Already have an account? Login</a></p>
  <p><a routerLink="/">Back to home</a></p>
</div>
