<section class="application-shell">
  <h2>Submit Adoption Application</h2>
  <p class="subtitle">Tell us about your home so we can match you with the right animal.</p>

  @if (error) {
    <p class="error">{{ error }}</p>
  }
  @if (submitted) {
    <p class="success">Application submitted successfully. You'll hear back from us if you're a good fit!</p>
  }

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-card">
    <label class="field">
      Pet
      <select formControlName="animalId" [disabled]="animalsLoading">
        <option value="">{{ animalsLoading ? 'Loading animals...' : 'Select a pet' }}</option>
        @for (animal of animals; track animal.id) {
          <option [value]="animal.id">{{ animal.name }}</option>
        }
      </select>
    </label>

    <h3>Application Details</h3>

    <div class="grid-mixed">
      <label class="field field-compact">
        Household size
        <input type="number" formControlName="questionnaireHouseholdSize" min="1" max="10" />
      </label>

      <label class="field">
        Phone number
        <input type="text" formControlName="questionnairePhone" placeholder="(555) 123-4567" />
      </label>
    </div>

    <div class="grid-2">
      <label class="field">
        City
        <input type="text" formControlName="questionnaireCity" />
      </label>

      <label class="field">
        State
        <input type="text" formControlName="questionnaireState" />
      </label>
    </div>

    <div class="grid-2">
      <label class="field">
        ZIP code
        <input type="text" formControlName="questionnaireZip" />
      </label>

      <label class="field">
        Housing type
        <select formControlName="questionnaireHousingType">
          <option value="">Select one</option>
          <option value="HOUSE">House</option>
          <option value="APARTMENT">Apartment</option>
          <option value="CONDO">Condo</option>
          <option value="OTHER">Other</option>
        </select>
      </label>
    </div>

    <div class="checkbox-group">
      <p class="checkbox-heading">Check all that apply to you:</p>
      <label class="checkbox-label"><input type="checkbox" formControlName="questionnaireHasYard" /> I have a yard.</label>
      <label class="checkbox-label"><input type="checkbox" formControlName="questionnaireHasKids" /> I have kids in my home.</label>
      <label class="checkbox-label"><input type="checkbox" formControlName="questionnaireHasOtherPets" /> I have other pets.</label>
      <label class="checkbox-label"><input type="checkbox" formControlName="questionnaireNeedsGoodWithKids" /> I need an animal that is good with kids.</label>
      <label class="checkbox-label"><input type="checkbox" formControlName="questionnaireNeedsGoodWithOtherPets" /> I need an animal that is good with other pets.</label>
      <label class="checkbox-label"><input type="checkbox" formControlName="questionnaireWillingMedicallyComplex" /> I am willing to take on a medically complex animal.</label>
    </div>

    <label class="field">
      Additional notes
      <textarea rows="4" formControlName="questionnaireNotes" placeholder="Share anything else that would help us find a great match."></textarea>
    </label>

    <div class="actions">
      <button type="submit" [disabled]="submitted || loading || animalsLoading || form.invalid || !selectedAnimalName">
        {{ loading ? 'Submitting…' : 'Submit application' }}
      </button>
      <a routerLink="/adopter/applications">Cancel</a>
    </div>
  </form>
</section>
